<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GameBackLoggarr{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {% if user is defined and user %}
  <nav class="navbar">
    <a href="/games" class="nav-brand">🎮 GameBackLoggarr</a>
    <div class="nav-links">
      <a href="/games" class="nav-link">Backlog</a>
      <a href="/recommendations" class="nav-link">✨ Discover</a>
    </div>
    <div class="nav-right">
      <span class="nav-user">{{ user.username }}</span>
      <a href="/logout" class="nav-logout">Sign out</a>
    </div>
  </nav>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
